<script>
  const container = document.getElementById('hotPicksContainer');

  let autoScroll;

  function startAutoScroll() {
    autoScroll = setInterval(() => {
      container.scrollBy({
        left: 1,
        behavior: 'smooth'
      });

      // Reset scroll for infinite loop illusion
      if (container.scrollLeft + container.clientWidth >= container.scrollWidth - 5) {
        container.scrollTo({ left: 0, behavior: 'auto' });
      }
    }, 20); // speed (lower = faster)
  }

  function stopAutoScroll() {
    clearInterval(autoScroll);
  }

  function scrollPicks(direction) {
    stopAutoScroll(); // stop auto when user clicks
    const scrollAmount = 310;
    container.scrollBy({
      left: direction * scrollAmount,
      behavior: 'smooth'
    });
    startAutoScroll(); // resume after click
  }

  // Pause on hover
  container.addEventListener('mouseenter', stopAutoScroll);
  container.addEventListener('mouseleave', startAutoScroll);

  // Start on load
  startAutoScroll();
</script>
