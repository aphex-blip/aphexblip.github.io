<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LINDI CLOTHING | Sustainable Style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Modern Sans-Serif Stack */
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
      margin: 0; 
      background: #ffffff; 
      color: #222; 
      overflow-x: hidden;
    }
    
    /* Navigation - Consistent f9f9f9 */
    nav { 
      background: #f9f9f9; 
      padding: 15px 30px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky; 
      top: 0; 
      z-index: 100; 
      border-bottom: 1px solid #eee; 
    }
    .logo-container { display: flex; align-items: center; text-decoration: none; }
    .logo-img { height: 45px; margin-right: 12px; }
    .brand-name { font-size: 18px; letter-spacing: 4px; color: #333; font-weight: 500; text-transform: uppercase; }
    nav a { color: #666; text-decoration: none; margin: 0 15px; font-size: 12px; letter-spacing: 1.5px; font-weight: 500; }

    /* Hero Section */
    .hero {
      position: relative;
      height: 80vh; /* Takes up 80% of the screen height */
      width: 100%;
      background: url('hero.png') no-repeat center center;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    /* Dark overlay to make text readable */
    .hero::after {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.2); /* Very light dark tint */
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero-content h1 {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-shadow: 0px 2px 10px rgba(0,0,0,0.3);
    }

    .hero-btn {
      display: inline-block;
      padding: 18px 40px;
      background: #ffffff;
      color: #333;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: 0.3s ease;
      font-weight: 600;
    }

    .hero-btn:hover {
      background: #9BA88E; /* Sage Green from your logo */
      color: white;
    }

    /* Statement Section */
    .statement {
      padding: 100px 20px;
      text-align: center;
      background: white;
    }

    .statement p {
      max-width: 600px;
      margin: 0 auto;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 1px;
      color: #555;
      line-height: 1.8;
    }

    /* Footer - Consistent f9f9f9 */
    footer { 
      background: #f9f9f9; 
      text-align: center; 
      padding: 60px 20px; 
      font-size: 11px; 
      color: #aaa; 
      letter-spacing: 2px; 
      border-top: 1px solid #eee; 
      text-transform: uppercase; 
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo-container">
    <img src="logo.png" alt="Lindi Logo" class="logo-img">
    <span class="brand-name">LINDI</span>
  </a>
  <div>
    <a href="index.html">HOME</a>
    <a href="shop.html">SHOP</a>
    <a href="about.html">ABOUT</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Handcrafted Style</h1>
    <a href="shop.html" class="hero-btn">Explore Collection</a>
  </div>
</section>

<section class="statement">
  <p>Sustainable materials, timeless designs, and a commitment to quality. Based in Sri Lanka, made for the world.</p>
</section>

<footer>
  <p>HANDCRAFTED | SUSTAINABLE | STYLE</p>
  <p>&copy; 2026 LINDI CLOTHING - MADE IN SRI LANKA</p>
</footer>

</body>
</html>
