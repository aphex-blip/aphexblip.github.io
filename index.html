<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UrbanWear</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      padding: 10px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>UrbanWear</header>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/300" alt="T-shirt">
    <h3>Black T-Shirt</h3>
    <p class="price">Rs. 2500</p>
    <a class="btn" href="https://wa.me/94725050456?text=Hi! I want to order Black T-Shirt">
      Order on WhatsApp
    </a>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" alt="Hoodie">
    <h3>Grey Hoodie</h3>
    <p class="price">Rs. 4500</p>
    <a class="btn" href="https://wa.me/94725050456?text=Hi! I want to order Grey Hoodie">
      Order on WhatsApp
    </a>
  </div>

</div>

</body>
</html>
