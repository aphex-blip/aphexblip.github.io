<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UrbanWear</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Georgia', serif; /* A more elegant font for your brand */
      margin: 0;
      background: #fdfdfd; /* Off-white for a premium feel */
      color: #333;
    }

    nav {
      background: #ffffff;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #eee;
    }

    .logo-container {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .logo-img {
      height: 50px; /* Adjust based on your logo shape */
      margin-right: 10px;
    }

    .brand-name {
      font-size: 22px;
      letter-spacing: 3px;
      color: #333;
      font-weight: bold;
      text-transform: uppercase;
    }

    nav a {
      color: #555;
      text-decoration: none;
      margin: 0 15px;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      padding: 60px 20px;
      max-width: 1200px;
      margin: auto;
    }

    .product {
      background: #fff;
      text-align: center;
      transition: 0.3s;
    }

    .product img {
      width: 100%;
      height: auto;
      max-height: 550px;
      object-fit: contain;
      background: #f9f9f9;
    }

    .price {
      font-size: 18px;
      color: #888;
      margin: 10px 0;
    }

    .btn {
      display: block;
      padding: 15px;
      background: #4A4A4A; /* Dark charcoal from your logo */
      color: white;
      text-decoration: none;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn:hover {
      background: #9BA88E; /* Sage green from your logo */
    }

    footer {
      text-align: center;
      padding: 40px;
      font-size: 12px;
      color: #999;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

<nav>
  <div class="logo" style="color:white;">URBANWEAR</div>
  <div>
    <a href="index.html">HOME</a>
    <a href="shop.html">SHOP</a>
    <a href="about.html">ABOUT</a>
  </div>
</nav>

<div class="container">

  <div class="product">
    <img src="black-t-shirt.jpg" alt="T-shirt">
    <div class="product-info">
      <h3>Black T-Shirt</h3>
      <p class="price">Rs. 2500</p>
      <a class="btn" href="https://wa.me/94725050456?text=Hi! I want to order the Black T-Shirt">Order on WhatsApp</a>
    </div>
  </div>

  <div class="product">
    <img src="grey-hoodie.jpg" alt="Hoodie">
    <div class="product-info">
      <h3>Grey Hoodie</h3>
      <p class="price">Rs. 4500</p>
      <a class="btn" href="https://wa.me/94725050456?text=Hi! I want to order the Grey Hoodie">Order on WhatsApp</a>
    </div>
  </div>

</div>

</body>
</html>
