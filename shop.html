<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop | LINDI CLOTHING</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    /* Modern Sans-Serif Stack */
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
      margin: 0; 
      background: #ffffff; 
      color: #222; 
      line-height: 1.6;
    }
    
    /* Navigation - Consistent f9f9f9 */
    nav { 
      background: #f9f9f9; 
      padding: 15px 30px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky; 
      top: 0; 
      z-index: 100; 
      border-bottom: 1px solid #eee; 
    }
    .logo-container { display: flex; align-items: center; text-decoration: none; }
    .logo-img { height: 45px; margin-right: 12px; }
    .brand-name { font-size: 18px; letter-spacing: 4px; color: #333; font-weight: 500; text-transform: uppercase; }
    nav a { color: #666; text-decoration: none; margin: 0 15px; font-size: 12px; letter-spacing: 1.5px; font-weight: 500; }

    .shop-header { text-align: center; padding: 80px 0 40px 0; text-transform: uppercase; letter-spacing: 6px; font-weight: 300; font-size: 14px; }

    /* Product Grid */
    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; padding: 20px; max-width: 1200px; margin: auto; }
    .product { background: #fff; text-align: center; transition: transform 0.3s ease; }
    .product:hover { transform: translateY(-5px); }
    .product img { width: 100%; height: auto; max-height: 550px; object-fit: contain; background: #fdfdfd; }
    
    .product-info { padding: 25px 0; }
    .product-info h3 { font-size: 16px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .price { font-size: 15px; color: #888; margin-bottom: 15px; letter-spacing: 0.5px; }
    
    /* Modern Charcoal Button */
    .btn { 
      display: inline-block; 
      width: 85%;
      padding: 14px; 
      background: #333; 
      color: white; 
      text-decoration: none; 
      font-size: 11px; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      transition: all 0.3s ease; 
      font-weight: 600;
    }
    .btn:hover { background: #9BA88E; }

    /* Footer - Consistent f9f9f9 */
    footer { background: #f9f9f9; text-align: center; padding: 60px 20px; font-size: 11px; color: #aaa; letter-spacing: 2px; border-top: 1px solid #eee; text-transform: uppercase; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo-container">
    <img src="logo.png" alt="Lindi Logo" class="logo-img">
    <span class="brand-name">LINDI</span>
  </a>
  <div>
    <a href="index.html">HOME</a>
    <a href="shop.html">SHOP</a>
    <a href="about.html">ABOUT</a>
  </div>
</nav>

<div class="shop-header"><h1>Our Collection</h1></div>

<div class="container">
  <div class="product">
    <img src="black-t-shirt.jpg" alt="Black T-shirt">
    <div class="product-info">
      <h3>Black T-Shirt</h3>
      <p class="price">Rs. 2500</p>
      <a class="btn" href="https://wa.me/94725050456?text=Hi! I want to order the Black T-Shirt">Order on WhatsApp</a>
    </div>
  </div>

  <div class="product">
    <img src="grey-hoodie.jpg" alt="Grey Hoodie">
    <div class="product-info">
      <h3>Grey Hoodie</h3>
      <p class="price">Rs. 4500</p>
      <a class="btn" href="https://wa.me/94725050456?text=Hi! I want to order the Grey Hoodie">Order on WhatsApp</a>
    </div>
  </div>
</div>

<footer>
  <p>HANDCRAFTED | SUSTAINABLE | STYLE</p>
  <p>&copy; 2026 LINDI CLOTHING - MADE IN SRI LANKA</p>
</footer>

</body>
</html>
